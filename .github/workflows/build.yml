name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          export THEOS=${{ github.workspace }}/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git $THEOS --depth 1
          SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version)
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p "$THEOS/sdks"
          ln -s "$SDK_PATH" "$THEOS/sdks/iPhoneOS${SDK_VER}.sdk"
          echo "SDK_VERSION=$SDK_VER" >> $GITHUB_ENV
          echo "SDK setup complete: iPhoneOS${SDK_VER}.sdk"

      - name: Build package
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioMix-deb
          path: packages/*.deb

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
          generate_release_notes: true
